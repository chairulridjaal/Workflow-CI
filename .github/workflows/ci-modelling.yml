name: ML Pipeline CI

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  run-and-build:
    runs-on: ubuntu-latest

    steps:
    - name: Run actions/checkout@v4
      uses: actions/checkout@v4

    - name: Set up Python 3.10
      uses: actions/setup-python@v5
      with:
        python-version: '3.10.14'
        cache: 'pip'

    - name: Check Env
      run: |
        python --version
        pip --version

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install mlflow==2.19.0
        pip install -r MLProject/requirements.txt

    - name: Run mlflow project
      run: |
        mlflow run ./MLProject --env-manager=local

    - name: Get latest MLflow run_id
      id: get_run_id
      run: |
        RUN_ID=$(basename $(ls -td mlruns/0/*/ | head -1))
        echo "RUN_ID=$RUN_ID" >> $GITHUB_ENV

    - name: Install Python dependencies
      run: |
        echo "Dependencies ready"

    - name: Upload to GitHub
      uses: actions/upload-artifact@v4
      with:
        name: mlflow-model-artifact
        path: mlruns/0/${{ env.RUN_ID }}/artifacts/

    - name: Build Docker Model
      run: |
        mlflow models build-docker -m "runs:/${{ env.RUN_ID }}/model" -n titanic-mlops:latest --env-manager=local

    - name: Log in to Docker Hub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Tag Docker Image
      run: |
        docker tag titanic-mlops:latest ${{ secrets.DOCKER_USERNAME }}/titanic-mlops:latest

    - name: Push Docker Image
      run: |
        docker push ${{ secrets.DOCKER_USERNAME }}/titanic-mlops:latest
